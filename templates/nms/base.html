<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NMS 모니터링{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/nms.css' %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="logo"><a href="{% url 'dashboard' %}">NMS</a><span class="logo-sub">Monitor</span></h1>
        </div>
        <nav class="header-nav">
            <a href="{% url 'dashboard' %}" class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a>
            <a href="{% url 'alerts' %}" class="nav-link {% block nav_alerts %}{% endblock %}">Alerts</a>
            <a href="{% url 'settings' %}" class="nav-link {% block nav_settings %}{% endblock %}">Settings</a>
            <a href="/admin/" class="nav-link">Admin</a>
        </nav>
        <div class="header-right">
            <span class="datetime" id="datetime"></span>
        </div>
    </header>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    <div id="toast-container"></div>
    <script src="{% static 'js/nms.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
